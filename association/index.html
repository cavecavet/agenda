<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Comunitaria</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     CONFIGURACIÓ — els valors s'injecten via GitHub Actions
     ═══════════════════════════════════════════════ -->
<script>
const CONFIG = {
    // ① Supabase → obtén aquests valors a supabase.com > el teu projecte > Settings > API
    supabaseUrl:  'TU_SUPABASE_URL',          // ej: https://abcxyz.supabase.co
    supabaseKey:  'TU_SUPABASE_ANON_KEY',     // clave "anon public"

    // ② CallMeBot (WhatsApp) → ver guía SETUP.md
    callmebotPhone:  'TU_NUMERO',             // ej: 34612345678  (sin + ni espacios)
    callmebotApiKey: 'TU_APIKEY_CALLMEBOT',

    // ③ General
    nombreAsociacion: 'Cave Cavet',
    actividadDefault: 'Activitat 🎉',
    tipoAgenda: 'asociacion',
    adminPasswordHash: 'cambia_esta_clave',
};
</script>

<!-- ═══ HEADER ═══ -->
<header>
    <div class="header-brand">
        <img src="../images/logo2.png" class="header-icon" alt="">
        <div>
            <div class="header-title">Associació Cave Cavet</div>
            <div class="header-sub">Activitats · Franges horàries</div>
        </div>
    </div>
    <div class="header-badge" id="headerBadge"></div>
    <svg class="header-wave" viewBox="0 0 400 28" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,14 C60,28 120,0 180,14 C240,28 300,0 360,14 C380,19 392,22 400,22 L400,28 L0,28 Z" fill="white"/>
    </svg>
</header>

<!-- ═══ WEEK NAV ═══ -->
<div class="week-nav">
    <button onclick="changeWeek(-1)">← Anterior</button>
    <span class="week-label" id="weekLabel"></span>
    <button onclick="changeWeek(1)">Següent →</button>
</div>

<!-- ═══ MAIN ═══ -->
<main id="mainContent">
    <div class="loading">🌊 Carregant…</div>
</main>

<!-- ═══ FAB ADMIN ═══ -->
<button class="fab-admin" onclick="openAdmin()">🔧 Admin</button>

<!-- ════════════════════════════════════════
     MODAL: INSCRIPCIÓ
     ════════════════════════════════════════ -->
<div class="overlay" id="signupOverlay">
    <div class="modal">
        <div class="modal-head">
            <div class="modal-title" id="mTitle"></div>
            <button class="close-btn" onclick="closeOverlay('signupOverlay')">✕</button>
        </div>
        <div class="modal-sub" id="mSub"></div>

        <!-- Llista d'apuntats -->
        <div class="enrolled-title">Apuntats</div>
        <ul class="enrolled-list" id="enrolledList"></ul>

        <hr class="divider">

        <!-- Alert -->
        <div id="signupAlert"></div>

        <!-- Formulari inscripció -->
        <div id="signupForm">
            <div class="form-group">
                <label class="form-label" for="nameInput">El teu nom</label>
                <input type="text" class="form-input" id="nameInput"
                       placeholder="Escriu el teu nom complet" autocomplete="name">
            </div>
            <div class="btn-row">
                <button class="btn btn-primary btn-full" id="signupBtn" onclick="doSignup()">✓ Apuntar-me</button>
                <button class="btn btn-secondary" onclick="closeOverlay('signupOverlay')">Cancel·la</button>
            </div>
        </div>

        <!-- Ja apuntat -->
        <div id="alreadySection" style="display:none">
            <div class="alert alert-success">✓ Ja estàs apuntat/ada a aquesta franja</div>
            <button class="btn btn-danger btn-full" onclick="doUnsignup()">✕ Esborrar-me d'aquesta franja</button>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════
     MODAL: ADMIN
     ════════════════════════════════════════ -->
<div class="overlay" id="adminOverlay">
    <div class="modal">
        <div class="modal-head" style="margin-bottom:1.1rem">
            <div class="modal-title">⚙️ Panell Admin</div>
            <button class="close-btn" onclick="closeOverlay('adminOverlay')">✕</button>
        </div>

        <!-- Login -->
        <div id="adminLogin">
            <div class="form-group">
                <label class="form-label">Contrasenya</label>
                <input type="password" class="form-input" id="adminPwd"
                       placeholder="Contrasenya admin"
                       onkeypress="if(event.key==='Enter') checkAdminPwd()">
            </div>
            <button class="btn btn-primary btn-full" onclick="checkAdminPwd()">Entrar</button>
            <div id="adminLoginErr" style="color:var(--danger);font-size:0.8rem;margin-top:0.4rem"></div>
        </div>

        <!-- Panel -->
        <div id="adminPanel" style="display:none">
            <div id="adminAlert"></div>

            <!-- Crear franges -->
            <div style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-500);margin-bottom:0.6rem">
                Crear franges horàries
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Des de data</label>
                    <input type="date" class="form-input" id="aDateFrom">
                </div>
                <div class="form-group">
                    <label class="form-label">Fins a data</label>
                    <input type="date" class="form-input" id="aDateTo">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Hora inici</label>
                    <input type="time" class="form-input" id="aTimeFrom" value="09:00">
                </div>
                <div class="form-group">
                    <label class="form-label">Hora fi</label>
                    <input type="time" class="form-input" id="aTimeTo" value="13:00">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Activitat</label>
                    <input type="text" class="form-input" id="aActivity">
                </div>
                <div class="form-group">
                    <label class="form-label">Places per franja</label>
                    <input type="number" class="form-input" id="aCapacity" value="8" min="1" max="100">
                </div>
            </div>
            <div class="form-group">
                <label class="check-label">
                    <input type="checkbox" id="aNoSunday" checked>
                    No incloure diumenges
                </label>
            </div>
            <button class="btn btn-primary btn-full" id="createBtn" onclick="createSlots()">Crear franges</button>

            <hr class="divider">

            <div style="font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--gray-500);margin-bottom:0.5rem">
                Eliminar franges
            </div>
            <div style="font-size:0.8rem;color:var(--gray-600);margin-bottom:0.65rem">
                Elimina totes les franges de la setmana visible (i les seves inscripcions).
            </div>
            <button class="btn btn-danger btn-full" onclick="deleteWeekSlots()">
                🗑 Eliminar franges d'aquesta setmana
            </button>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════
     MODAL: TORN SENCER
     ════════════════════════════════════════ -->
<div class="overlay" id="tornOverlay">
    <div class="modal">
        <div class="modal-head">
            <div class="modal-title" id="tTitle"></div>
            <button class="close-btn" onclick="closeOverlay('tornOverlay')">✕</button>
        </div>
        <div class="modal-sub" id="tSub"></div>

        <div class="enrolled-title">Franges incloses</div>
        <ul class="enrolled-list" id="tornList"></ul>

        <hr class="divider">
        <div id="tornAlert"></div>

        <div class="form-group">
            <label class="form-label" for="tornNameInput">El teu nom</label>
            <input type="text" class="form-input" id="tornNameInput"
                   placeholder="Escriu el teu nom complet" autocomplete="name">
        </div>
        <div class="btn-row">
            <button class="btn btn-primary btn-full" id="tornBtn" onclick="doTornSencer()">✓ Apuntar-me a totes</button>
            <button class="btn btn-secondary" onclick="closeOverlay('tornOverlay')">Cancel·la</button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>

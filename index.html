<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Comunitaria</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #00b4d8 0%, #0096c7 50%, #06a77d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 4rem 1.5rem 2rem;
            position: relative;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 3rem;
        }
        
        .header h1 {
            margin-bottom: 0.5rem;
            font-size: 3rem;
            line-height: 1.1;
            text-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
            font-style: italic;
            color: rgba(255, 255, 255, 0.95);
        }
        
        .cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            justify-items: center;
            margin: 0 auto 2rem;
            max-width: 420px;
            width: 100%;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.14);
            border-radius: 28px;
            padding: 2rem 1.5rem;
            box-shadow: 0 16px 48px rgba(0, 101, 128, 0.18);
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.18);
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 380px;
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 180, 216, 0.08) 0%, rgba(6, 167, 125, 0.08) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }
        
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 28px 68px rgba(0, 101, 128, 0.24);
            border-color: rgba(255, 255, 255, 0.28);
        }
        
        .card:hover::before {
            opacity: 1;
        }
        
        .card-icon {
            font-size: 2.4rem;
            margin-bottom: 1rem;
        }
        
        .card-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.45rem;
            color: #ffffff;
        }
        
        .card-desc {
            font-size: 0.98rem;
            color: rgba(255, 255, 255, 0.78);
            margin-bottom: 1.2rem;
            line-height: 1.5;
        }
        
        .card-link {
            display: inline-block;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.28) 100%);
            color: white;
            padding: 0.8rem 1.4rem;
            border-radius: 999px;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }
        
        .card-link:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }
        
        .footer a:hover {
            border-bottom-color: white;
        }
        
        /* Animación de burbujas */
        @keyframes float-up {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.4;
            }
            90% {
                opacity: 0.1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }
        
        .bubble {
            position: fixed;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(0,180,216,0.3));
            pointer-events: none;
            z-index: 0;
        }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }
        
        .footer a {
            color: white;
            text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,0.5);
        }
        
        @media (max-width: 600px) {
            body {
                padding: 3rem 1rem 1.5rem;
            }
            .header h1 {
                font-size: 2.4rem;
            }
            .cards {
                max-width: 100%;
            }
            .card {
                padding: 1.75rem 1.25rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🌊 Mon Marí 🌊</h1>
        <p>Explora les activitats de l'associació</p>
    </div>
    
    <div class="cards" style="max-width: 400px; margin-left: auto; margin-right: auto;">
        <a href="/agenda/association/" class="card">
            <div class="card-icon">🐠</div>
            <div class="card-title">Associació Cave Cavet</div>
            <div class="card-desc">Agenda d'activitats comunitàries</div>
            <div class="card-link">Descobrir →</div>
        </a>
    </div>

    <div class="footer">
        <p>🌍 Sistema de gestió d'activitats marineres<br>
        <a href="https://github.com" target="_blank">Codi font a GitHub</a></p>
    </div>
</div>
-->

<script>
// Crear burbujas flotantes
function createBubble() {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    
    const size = Math.random() * 100 + 20;
    const left = Math.random() * 100;
    const duration = Math.random() * 8 + 6;
    
    bubble.style.width = size + 'px';
    bubble.style.height = size + 'px';
    bubble.style.left = left + '%';
    bubble.style.bottom = '-50px';
    bubble.style.animation = `float-up ${duration}s ease-in infinite`;
    
    document.body.appendChild(bubble);
    
    setTimeout(() => bubble.remove(), duration * 1000);
}

// Generar burbujas periodicamente
setInterval(createBubble, 2000);

// Crear algunas al inicio
Array.from({length: 3}).forEach(() => createBubble());
</script>

</body>
</html>

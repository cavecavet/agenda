name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Inject credentials
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          sed -i "s|TU_SUPABASE_URL|$SUPABASE_URL|g" association/index.html
          sed -i "s|TU_SUPABASE_ANON_KEY|$SUPABASE_KEY|g" association/index.html
          sed -i "s|TU_NUMERO|$CALLMEBOT_PHONE|g" association/index.html
          sed -i "s|TU_APIKEY_CALLMEBOT|$CALLMEBOT_API_KEY|g" association/index.html
          sed -i "s|cambia_esta_clave|$ADMIN_PASSWORD|g" association/index.html
          echo "--- Verificació ---"
          grep -q "TU_SUPABASE_URL" association/index.html && echo "ERROR: SUPABASE_URL no substituïda" || echo "OK: SUPABASE_URL substituïda"
          grep -q "TU_SUPABASE_ANON_KEY" association/index.html && echo "ERROR: SUPABASE_KEY no substituïda" || echo "OK: SUPABASE_KEY substituïda"
          grep -q "cambia_esta_clave" association/index.html && echo "ERROR: ADMIN_PASSWORD no substituïda" || echo "OK: ADMIN_PASSWORD substituïda"

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
